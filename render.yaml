services:
  - type: worker
    name: btc-active-range-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: FEISHU_WEBHOOK
        sync: false
      - key: MODE
        sync: false
env:
  FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
  MODE: ${{ secrets.MODE }}
